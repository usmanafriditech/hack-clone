<div class="container ">
    
 
  <!-- Profile Header -->
  <section class="profile-header container">
    <span>PROFILE</span>
    <h1>Ayesha Khan</h1>
    <p>Bot <span class="text-light">•</span> Karachi</p>
  </section>

  <!-- Main Grid -->
  <section class="my-container container">

    <!-- Left Card -->
    <div class="my-card">

        <p class="green">PUBLIC PROFILE</p>

        <div class="heading-content">
            <h2 >Skills and reputation</h2>
        </div>

      <div class="my-row">
        <span>Trust score</span>
        <span class="fw-bold">100%</span>
      </div>

      <div class="my-row">
        <span>Contributions</span>
        <span class="fw-bold">35</span>
      </div>

      <h4 class="fw-bold">Skills</h4>
      <div class="tags">
        <span>Figma</span>
        <span>UI/UX</span>
        <span>HTML/CSS</span>
        <span>Cerear Guidance</span>
      </div>

      <h4 class="fw-bold">Badges</h4>
      <div class="tags">
        <span>Design Ally</span>
        <span>Past Respondar</span>
        <span>Top Mentor</span>
      </div>

    </div>

    <!-- Right Card -->
    <div class="my-card card2">
        <p class="green">EDIT PROFILE</p>
      <div class="heading-content">
        <h2>Update your identity</h2>
      </div>

      <div class="input-field">
        <div class="top-field">
            <div class="first">
                <label for="Name">Name</label>
        <input type="text" placeholder="Name">
            </div>
        <div class="sec">
            <label for="location">Location</label>
      <input type="text" placeholder="Location">
        </div>
        </div>
      <label for="Skills">Skills</label>
      <input type="text" placeholder="Skills">
      <label for="Interests">Interests</label>
      <input type="text" placeholder="Interests">
      </div>

      <button>Save profile</button>
    </div>

  </section>

</div>

</div>
